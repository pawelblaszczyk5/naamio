name: "naamio"

# cspell:ignore initdb, tmpfs, electricsql

services:
  postgres:
    image: postgres:18.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example_root_password_123
    ports:
      - 6206:5432
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./config/init-postgres-databases.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    tmpfs:
      - /tmp
    command:
      - -c
      - listen_addresses=*
      - -c
      - wal_level=logical

  electric:
    image: electricsql/electric:1.7.2
    restart: unless-stopped
    ports:
      - 6207:3000
    environment:
      DATABASE_URL: postgresql://naamio_electric:example_electric_password_123@postgres:5432/naamio_app
      ELECTRIC_SECRET: example_electric_secret_123
      ELECTRIC_STORAGE_DIR: /var/lib/electric/persistent
    volumes:
      - electric_data:/var/lib/electric/persistent
    depends_on:
      - postgres

  otel-lgtm:
    image: grafana/otel-lgtm:0.28.0
    restart: unless-stopped
    ports:
      - 6208:4318
      - 6209:3000
    volumes:
      - otel_data:/data

  drizzle-gateway:
    image: ghcr.io/drizzle-team/gateway:1.3.0
    restart: unless-stopped
    ports:
      - 6210:4983
    volumes:
      - drizzle_data:/app

volumes:
  postgres_data:
  otel_data:
  electric_data:
  drizzle_data:
