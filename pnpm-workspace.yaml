# cspell:ignore esbuild, unrs, msgpackr, vitest, subdeps
packages:
  - apps/*
  - packages/*
  - tooling/*

allowBuilds:
  esbuild: false
  msgpackr-extract: true
  unrs-resolver: true

allowUnusedPatches: false
blockExoticSubdeps: true

catalog:
  "@babel/core": "^7.29.0"
  "@babel/plugin-syntax-jsx": ^7.28.6
  "@babel/preset-typescript": ^7.28.5
  "@effect/ai-openai": 4.0.0-beta.43
  "@effect/language-service": ^0.84.3
  "@effect/platform-node": 4.0.0-beta.43
  "@effect/platform-node-shared": 4.0.0-beta.43
  "@effect/sql-pg": 4.0.0-beta.43
  "@effect/vitest": 4.0.0-beta.43
  "@electric-sql/client": ^1.5.14
  "@fontsource-variable/ibm-plex-sans": ^5.2.8
  "@rolldown/plugin-babel": ^0.2.2
  "@stylexjs/babel-plugin": ^0.18.2
  "@stylexjs/eslint-plugin": ^0.18.2
  "@stylexjs/postcss-plugin": ^0.18.2
  "@stylexjs/stylex": ^0.18.2
  "@types/node": ^25.5.2
  "@types/react": ^19.2.14
  "@types/react-dom": ^19.2.3
  "@typescript-eslint/utils": ^8.58.0
  "@vitejs/devtools": ^0.1.13
  "@vitejs/plugin-react": ^6.0.1
  babel-plugin-react-compiler: ^1.0.0
  effect: 4.0.0-beta.43
  eslint: ^10.1.0
  fontaine: ^0.8.0
  react: 19.3.0-canary-80b1cab3-20260331
  react-dom: 19.3.0-canary-80b1cab3-20260331
  tsc-alias: ^1.8.16
  type-fest: ^5.5.0
  typescript: ^5.9.3
  vite: ^8.0.3
  vitest: ^4.1.2
  wait-on: ^9.0.4

disallowWorkspaceCycles: true
engineStrict: true
linkWorkspacePackages: true
managePackageManagerVersions: true

overrides:
  "@typescript-eslint/utils": "catalog:"
  eslint: "catalog:"
  eslint-import-resolver-typescript>eslint-plugin-import: "-"
  react: "catalog:"
  react-dom: "catalog:"
  vite: "catalog:"

packageManagerStrictVersion: true

patchedDependencies:
  "@babel/preset-typescript@7.28.5": patches/@babel__preset-typescript.patch
  "@stylexjs/eslint-plugin@0.18.2": patches/@stylexjs__eslint-plugin.patch
  prettier-plugin-sql@0.20.0: patches/prettier-plugin-sql.patch

saveWorkspaceProtocol: true
strictDepBuilds: true
trustPolicy: no-downgrade
verifyDepsBeforeRun: "install"
