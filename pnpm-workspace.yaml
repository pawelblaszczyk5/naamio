# cspell:ignore esbuild, unrs, msgpackr, vitest, subdeps, hono
packages:
  - apps/*
  - packages/*
  - tooling/*

allowBuilds:
  esbuild: false
  msgpackr-extract: true
  unrs-resolver: true

allowUnusedPatches: false
blockExoticSubdeps: true

catalog:
  "@babel/core": "^7.29.0"
  "@babel/plugin-syntax-jsx": ^7.28.6
  "@babel/preset-typescript": ^7.28.5
  "@effect/language-service": ^0.86.4
  "@effect/platform-node": 4.0.0-beta.93
  "@effect/platform-node-shared": 4.0.0-beta.93
  "@effect/sql-pg": 4.0.0-beta.93
  "@effect/vitest": 4.0.0-beta.93
  "@electric-sql/client": ^1.5.23
  "@fontsource-variable/ibm-plex-sans": ^5.2.8
  "@hono/node-server": ^2.0.8
  "@rolldown/plugin-babel": ^0.2.3
  "@stylexjs/babel-plugin": ^0.19.0
  "@stylexjs/eslint-plugin": ^0.19.0
  "@stylexjs/postcss-plugin": ^0.19.0
  "@stylexjs/stylex": ^0.19.0
  "@types/node": ^26.1.0
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@tanstack/react-router": ^1.170.17
  "@tanstack/react-start": ^1.168.27
  "@typescript-eslint/utils": ^8.62.1
  "@vitejs/plugin-react": ^6.0.3
  babel-plugin-react-compiler: ^1.0.0
  effect: 4.0.0-beta.93
  eslint: ^10.6.0
  fontaine: ^0.8.0
  hono: ^4.12.27
  react: 19.3.0-canary-b1786c31-20260618
  react-dom: 19.3.0-canary-b1786c31-20260618
  tsc-alias: ^1.9.0
  tsx: ^4.23.0
  type-fest: ^5.7.0
  typescript: ^6.0.3
  vite: ^8.1.3
  vitest: ^4.1.9
  wait-on: ^9.0.10

disallowWorkspaceCycles: true
engineStrict: true
linkWorkspacePackages: true
managePackageManagerVersions: true
minimumReleaseAge: 1440

overrides:
  eslint: "catalog:"
  eslint-import-resolver-typescript>eslint-plugin-import: "-"
  react: "catalog:"
  react-dom: "catalog:"

packageManagerStrictVersion: true

patchedDependencies:
  "@babel/preset-typescript@7.28.5": patches/@babel__preset-typescript.patch
  "@stylexjs/stylex": patches/@stylexjs__stylex.patch
  fumadocs-mdx: patches/fumadocs-mdx.patch
  prettier-plugin-sql@0.20.0: patches/prettier-plugin-sql.patch

saveWorkspaceProtocol: true
strictDepBuilds: true
trustLockfile: true
verifyDepsBeforeRun: "install"
